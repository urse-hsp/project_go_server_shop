version: '3'

services:
  user-db:
    image: mysql:latest
    ports:
      - 3380:3306
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: farms2
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql/user:/var/lib/mysql

  cache-redis:
    image: redis:latest
    ports:
      - 6350:6379
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis/cache/:/data