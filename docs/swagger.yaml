        minimum: 1
        name: current
        required: true
        type: integer
      - description: 条数
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        required: true
        type: integer
      - description: 搜索
        in: query
        name: query
        type: string
      - description: 排序
        enum:
        - asc
        - desc
