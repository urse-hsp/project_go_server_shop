host: localhost:8080
info:
  contact: {}
  description: 接口文档
  title: go-server API
  version: "1.0"
paths:
  /api/private/v1/:id/attributes:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/attributedto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/attributedto.PublicDTO'
      summary: 分类参数创建
      tags:
      - 分类属性
    put:
      consumes:
      - application/json
      parameters:
      - description: 更新参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/attributedto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: No Content
          schema:
            type: string
      summary: 分类参数更新
      tags:
      - 分类属性
  /api/private/v1/categories:
    get:
      parameters:
      - in: query
        name: current
        type: integer
      - in: query
        name: pageSize
        type: integer
      - in: query
        name: query
        type: string
      - enum:
        - "1"
        - "2"
        - "3"
        in: query
        name: type
        type: string
        x-enum-varnames:
        - CategoryTypeLevel1
        - CategoryTypeLevel2
        - CategoryTypeLevel3
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/category.PublicDTO'
            type: array
      summary: 商品分类列表
      tags:
      - 商品分类
    post:
      consumes:
