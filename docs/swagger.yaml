      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/category.PrivateDTO'
      summary: 商品分类创建
      tags:
      - 商品分类
    put:
      consumes:
      - application/json
      parameters:
      - description: 更新参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/category.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/category.PrivateDTO'
      summary: 商品分类更新
      tags:
      - 商品分类
  /api/private/v1/categories/{id}:
    delete:
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
      summary: 商品分类删除
      tags:
      - 商品分类
  /api/private/v1/goods:
    get:
